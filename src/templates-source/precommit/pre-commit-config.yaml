# Installed by `@e0ipso/ai-knowledge-base init`.
#
# Run `pre-commit install` after committing this file so the gitleaks
# scanner runs on every commit. This is the second of two secret-scan
# passes (the first runs inside the capture hook); see PRD §6.
repos:
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.21.2
    hooks:
      - id: gitleaks
